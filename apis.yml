  description: >-
    The emnify REST API gives programmatic access to the emnify IoT SuperNetwork — global cellular connectivity for
    IoT devices. Manage SIMs, endpoints (devices), service and tariff profiles, events, SMS, eSIM (SGP.32) profiles,
    organizations, users, API callbacks, and the Data Streamer. Authenticate with short-lived JWTs obtained via
    application tokens or user credentials.
