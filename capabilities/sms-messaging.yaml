naftiko: 1.0.0-alpha2
info:
  label: emnify SMS Messaging
  description: Send mobile-terminated SMS to IoT endpoints, list mobile-originated SMS, and inspect/cancel pending messages.
  tags:
  - emnify
  - SMS
  - Messaging
  - IoT
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    EMNIFY_APPLICATION_TOKEN: EMNIFY_APPLICATION_TOKEN
capability:
  consumes:
  - type: http
    namespace: sms-messaging
    baseUri: https://cdn.emnify.net/api
    description: emnify SMS messaging
    resources:
    - name: endpoint-sms
      path: /v1/endpoint/{endpoint_id}/sms
      operations:
      - name: list-endpoint-sms
        method: GET
        inputParameters:
        - name: endpoint_id
          in: path
          type: integer
          required: true
        outputParameters:
        - name: result
          type: array
          value: $.
      - name: send-sms
        method: POST
        description: Send a mobile-terminated SMS to an endpoint
        inputParameters:
        - name: endpoint_id
          in: path
          type: integer
          required: true
        - name: body
          in: body
          type: object
          required: true
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: endpoint-sms-by-id
      path: /v1/endpoint/{endpoint_id}/sms/{sms_id}
      operations:
      - name: get-sms
        method: GET
        inputParameters:
        - name: endpoint_id
          in: path
          type: integer
          required: true
        - name: sms_id
          in: path
          type: integer
          required: true
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: cancel-sms
        method: DELETE
        description: Cancel a buffered SMS that has not yet been delivered
        inputParameters:
        - name: endpoint_id
          in: path
          type: integer
          required: true
        - name: sms_id
          in: path
          type: integer
          required: true
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      value: '{{env.EMNIFY_APPLICATION_TOKEN}}'
      placement: header
  exposes:
  - type: mcp
    namespace: sms-messaging-mcp
    port: 9092
    transport: http
    tools:
    - name: emnify-list-endpoint-sms
      description: List sent and received SMS for an endpoint
      hints: {readOnly: true, destructive: false, idempotent: true}
      call: sms-messaging.list-endpoint-sms
      outputParameters:
      - type: array
        mapping: $.
    - name: emnify-send-sms
      description: Send a mobile-terminated SMS to an endpoint
      hints: {readOnly: false, destructive: false, idempotent: false}
      call: sms-messaging.send-sms
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: emnify-cancel-sms
      description: Cancel a buffered SMS message
      hints: {readOnly: false, destructive: true, idempotent: true}
      call: sms-messaging.cancel-sms
      outputParameters:
      - type: object
        mapping: $.
