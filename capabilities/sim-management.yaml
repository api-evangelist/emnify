naftiko: 1.0.0-alpha2
info:
  label: emnify SIM Management
  description: emnify SIM lifecycle — list, retrieve, activate, suspend, register, and bulk-manage SIM cards in the emnify IoT SuperNetwork.
  tags:
  - emnify
  - SIM
  - IoT
  - Cellular
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    EMNIFY_APPLICATION_TOKEN: EMNIFY_APPLICATION_TOKEN
capability:
  consumes:
  - type: http
    namespace: sim-management
    baseUri: https://cdn.emnify.net/api
    description: emnify SIM management business capability — read and mutate SIM resources.
    resources:
    - name: sims
      path: /v1/sim
      operations:
      - name: list-sims
        method: GET
        description: List SIMs in the workspace with optional filtering and pagination
        outputRawFormat: json
        inputParameters:
        - name: q
          in: query
          type: string
          description: Filter expression (e.g. status:1)
        - name: page
          in: query
          type: integer
        - name: per_page
          in: query
          type: integer
        outputParameters:
        - name: result
          type: array
          value: $.
      - name: register-sim-batch
        method: POST
        description: Register a batch of SIMs using a Batch Identification Code (BIC)
        outputRawFormat: json
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: sim-by-id
      path: /v1/sim/{sim_id}
      operations:
      - name: get-sim
        method: GET
        description: Get SIM details
        outputRawFormat: json
        inputParameters:
        - name: sim_id
          in: path
          type: integer
          required: true
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-sim
        method: PATCH
        description: Update a SIM (status, customer_org assignment, etc.)
        outputRawFormat: json
        inputParameters:
        - name: sim_id
          in: path
          type: integer
          required: true
        - name: body
          in: body
          type: object
          required: true
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      value: '{{env.EMNIFY_APPLICATION_TOKEN}}'
      placement: header
  exposes:
  - type: rest
    namespace: sim-management-rest
    port: 8080
    description: REST adapter for emnify SIM Management
    resources:
    - path: /v1/sims
      name: sims
      operations:
      - method: GET
        name: list-sims
        call: sim-management.list-sims
        outputParameters:
        - type: array
          mapping: $.
      - method: POST
        name: register-sim-batch
        call: sim-management.register-sim-batch
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/sims/{sim-id}
      name: sim-by-id
      operations:
      - method: GET
        name: get-sim
        call: sim-management.get-sim
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: update-sim
        call: sim-management.update-sim
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: sim-management-mcp
    port: 9090
    transport: http
    description: MCP tools for emnify SIM management
    tools:
    - name: emnify-list-sims
      description: List SIMs in the emnify workspace
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: sim-management.list-sims
      outputParameters:
      - type: array
        mapping: $.
    - name: emnify-get-sim
      description: Retrieve a SIM by id
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: sim-management.get-sim
      outputParameters:
      - type: object
        mapping: $.
    - name: emnify-update-sim
      description: Update SIM status or assignment
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: sim-management.update-sim
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: emnify-register-sim-batch
      description: Register a batch of SIMs via Batch Identification Code
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: sim-management.register-sim-batch
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
