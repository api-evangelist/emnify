          content:
            application/json:
              schema:
                type: object
                properties: {}
        '400':
          description: Unexpected error in the API call. See the HTTP response body for details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimByIdPatchRequestBadRequestError'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
