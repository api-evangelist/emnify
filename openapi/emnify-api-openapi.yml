  /api/v2/endpoint/multi:
    post:
      operationId: bulk-create-endpoint
      summary: Bulk create endpoints
      description: "Create up to 2,000 endpoints in one request.\n\nUnlike [`POST /api/v1/endpoint`](/developers/api/endpoint/create-endpoint),\
        \ this bulk endpoint handles multiple endpoints safely in a single request without sequential execution constraints\
        \ between individual endpoints.\n\n<Note>\n  Execute bulk operations sequentially - wait for each bulk request to\
        \ complete before starting the next.\n</Note>\n\nIf a `sim` object is provided, the specified SIM is assigned to the\
        \ endpoint.\nThe `activate` property defaults to `false` and can be omitted unless the SIM should be activated during\
        \ this call.\n\nIf `activate` is set to `true`:\n- The SIM enters Factory Test Mode (FTM) if FTM is enabled for the\
        \ organization.\n- Otherwise, it goes directly to **Activated**.\n\nTo override this behavior and explicitly set the\
        \ SIM's status (for example, skip FTM even if it's enabled for your organization), include a `status` object within\
        \ the `sim` object.\n\n<Warning>\n  emnify charges for activated SIMs, even if the endpoint status is set to **Disabled**.\n\
        </Warning>\n"
      tags:
      - subpackage_endpoint
      parameters:
      - name: Authorization
        in: header
        description: 'An `auth_token` should be provided to authenticate a session.


          To obtain an `auth_token`, see the [`/api/v1/authenticate` **POST** request](/developers/api/authentication/authenticate).

          '
        required: true
        schema:
          type: string
      responses:
        '201':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ApiV2EndpointMultiPostResponsesContentApplicationJsonSchemaItems'
        '400':
          description: Request body is malformed
          content:
            application/json:
              schema:
                description: Any type
        '403':
          description: 'User doesn''t have permission to bulk create endpoints

            '
          content:
            application/json:
              schema:
                description: Any type
        '404':
          description: IP address space is full
          content:
            application/json:
              schema:
                description: Any type
        '422':
          description: 'Appears in one of the following cases:


            - Service profile is invalid

            - Tariff profile is invalid

            - Status is invalid

            - IP address space is invalid

            - Organization is invalid

            - Endpoints are invalid

            '
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkCreateEndpointRequestUnprocessableEntityError'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                service_profile:
                  $ref: '#/components/schemas/ApiV2EndpointMultiPostRequestBodyContentApplicationJsonSchemaServiceProfile'
                  description: 'Applies to all endpoints.

                    '
                tariff_profile:
                  $ref: '#/components/schemas/ApiV2EndpointMultiPostRequestBodyContentApplicationJsonSchemaTariffProfile'
                  description: 'Applies to all endpoints.

                    '
                status:
                  $ref: '#/components/schemas/ApiV2EndpointMultiPostRequestBodyContentApplicationJsonSchemaStatus'
                  description: 'Applies to all endpoints.

                    '
                organisation:
                  $ref: '#/components/schemas/ApiV2EndpointMultiPostRequestBodyContentApplicationJsonSchemaOrganisation'
                  description: 'If provided, it must include a valid `id` (cannot be empty).

                    '
                ip_address_space:
                  $ref: '#/components/schemas/ApiV2EndpointMultiPostRequestBodyContentApplicationJsonSchemaIpAddressSpace'
                  description: 'Required if any endpoint in the `endpoints` array has an `ip_address`.

                    '
                endpoints:
                  type: array
                  items:
                    $ref: '#/components/schemas/ApiV2EndpointMultiPostRequestBodyContentApplicationJsonSchemaEndpointsItems'
              required:
              - service_profile
              - tariff_profile
              - status
              - endpoints
    delete:
      operationId: bulk-delete-endpoint
      summary: Bulk delete endpoints
      description: "Deletes a list of endpoints in bulk, along with all child entities.\n\nUnlike [`DELETE /api/v1/endpoint/{endpoint_id}`](/developers/api/endpoint/endpoint-by-id-delete),\
        \ this bulk endpoint handles multiple endpoints safely in a single request without sequential execution constraints\
        \ between individual endpoints.\n\n<Note>\n  Execute bulk operations sequentially - wait for each bulk request to\
        \ complete before starting the next.\n</Note>\n\nIf a SIM is assigned to one of the endpoints, it's released and suspended.\n\
        If the `delete_sims` query parameter is set to `true`, the SIMs are also deleted.\n"
      tags:
      - subpackage_endpoint
      parameters:
      - name: delete_sims
        in: query
        description: 'If `true`, the SIMs will be deleted along with the endpoints.

          If `false`, the SIMs will only be suspended.

          Defaults to `false`.

          '
        required: false
        schema:
          type: boolean
          default: false
      - name: Authorization
        in: header
        description: 'An `auth_token` should be provided to authenticate a session.


          To obtain an `auth_token`, see the [`/api/v1/authenticate` **POST** request](/developers/api/authentication/authenticate).

          '
        required: true
        schema:
          type: string
      responses:
        '204':
          description: Endpoints deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties: {}
        '400':
          description: Request body is malformed
          content:
            application/json:
              schema:
                description: Any type
        '403':
          description: 'User doesn''t have permission to bulk delete endpoints

            '
          content:
            application/json:
              schema:
                description: Any type
        '404':
          description: 'Requested endpoint ID isn''t found

            '
          content:
            application/json:
              schema:
                description: Any type
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/ApiV2EndpointMultiDeleteRequestBodyContentApplicationJsonSchemaItems'
    patch:
      operationId: bulk-update-endpoint
      summary: Bulk update endpoints
      description: "Updates details of a list of endpoints in bulk.\n\nThe request body must be an array of endpoint objects.\n\
        Each object requires an `id` field to identify the endpoint, and you only need to include the fields you want to update.\n\
        \nUnlike [`PATCH /api/v1/endpoint/{endpoint_id}`](/developers/api/endpoint/endpoint-by-id-patch), this bulk endpoint\
        \ handles multiple endpoints safely in a single request without sequential execution constraints between individual\
        \ endpoints.\n\n<Note>\n  Execute bulk operations sequentially - wait for each bulk request to complete before starting\
        \ the next.\n</Note>\n\n<Warning>\n  emnify charges for activated SIMs, even if the endpoint status is set to **Disabled**.\n\
        \  To avoid accruing unexpected charges, update the SIM status to **Suspended** (`\"id\": 2`).\n</Warning>\n"
      tags:
      - subpackage_endpoint
      parameters:
      - name: Authorization
        in: header
        description: 'An `auth_token` should be provided to authenticate a session.


          To obtain an `auth_token`, see the [`/api/v1/authenticate` **POST** request](/developers/api/authentication/authenticate).

          '
        required: true
        schema:
          type: string
      responses:
        '204':
          description: Endpoints updated successfully
          content:
            application/json:
              schema:
                type: object
                properties: {}
        '400':
          description: Request body is malformed
          content:
            application/json:
              schema:
                description: Any type
        '403':
          description: 'User doesn''t have permission to bulk update endpoints

            '
          content:
            application/json:
              schema:
                description: Any type
        '404':
          description: 'Appears in one of the following cases:


            - IP address space isn''t found

            - IP address space is full

            '
          content:
            application/json:
              schema:
                description: Any type
        '422':
          description: 'Appears in one of the following cases:


            - Service profile is invalid

            - Tariff profile is invalid

            - Status is invalid

            - IP address space is invalid

            - IP address is invalid

            - SIM is invalid

            '
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkUpdateEndpointRequestUnprocessableEntityError'
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/ApiV2EndpointMultiPatchRequestBodyContentApplicationJsonSchemaItems'
