    post:
      operationId: dns-post
      summary: Create DNS config
      description: "Creates a DNS configuration object. The DNS config can be applied to a service profile and all endpoints\
        \ which use that service profile will have the associated DNS settings applied.\nDNS changes are instantly applied\
        \ to any **new PDP context**.\nConnected devices with previously established PDPs will continue to use the previous\
        \ nameserver config until the next time they reconnect.\n\nPrimary and secondary nameservers and IP version (`4` for\
        \ IPV4 or `6` for IPV6) must be specified with this request.\n\n<Info>\n  The system currently falls back to IPV4\
        \ for the actually-enforced networking settings of endpoints, therefore **the IPV6 parameter will be ignored** when\
        \ provided.\n</Info>\n"
      tags:
      - subpackage_serviceLookupsAndConfiguration
