        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ApiV1ServiceProfileProfileIdTrafficLimitGetResponsesContentApplicationJsonSchemaItems'
        '403':
          description: Service Profile is not found or not accessible
          content:
            application/json:
              schema:
                description: Any type
    post:
      operationId: add-service-profile-traffic-limit
      summary: Add data limit to service profile
      description: "This API endpoint allows you to add a data limit to a service profile.\nA data limit is a rule that defines\
        \ how much data a service can consume within a certain period.\nThis is useful for managing your data usage and avoiding\
        \ overage charges.\n\nYou can use this API to customize the data limit for your service profile by specifying the\
        \ service type, time period, volume threshold, and warning percentage.\nYou can also choose to apply the data limit\
        \ only to satellite radio access technology (RAT) types that use satellites for communication.\n\n<Note>\n  Only users\
        \ with `User` or `Admin` roles can use this API endpoint.\n  You can only add **one** data limit per service and satellite\
        \ RAT type combination.\n</Note>\n\nTo change the data limit, you must first delete the existing data limit and then\
        \ add a new one.\n**Exception**: Creating a temporary [traffic limit extension](/developers/api/endpoint/create-endpoint-traffic-limit-extension).\n"
      tags:
      - subpackage_serviceProfiles
      parameters:
      - name: profile_id
        in: path
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        description: 'An `auth_token` should be provided to authenticate a session.


          To obtain an `auth_token`, see the [`/api/v1/authenticate` **POST** request](/developers/api/authentication/authenticate).

          '
        required: true
        schema:
          type: string
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Service Profiles_AddServiceProfileTrafficLimit_Response_201'
        '400':
          description: One or more values of the data limit are invalid
          content:
            application/json:
              schema:
                description: Any type
        '403':
          description: Service Profile is not found or not accessible
          content:
            application/json:
              schema:
                description: Any type
        '409':
          description: Data Limit for the same traffic type and rat type combination already exists
          content:
            application/json:
              schema:
                description: Any type
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                service:
                  $ref: '#/components/schemas/ApiV1ServiceProfileProfileIdTrafficLimitPostRequestBodyContentApplicationJsonSchemaService'
                  description: 'Service type to which the limit applies.

                    The only supported service type is `Data`, which has an ID of `38`.

                    '
                satellite_only:
                  type: boolean
                  default: false
                  description: 'Determines if the limit only applies to satellite RAT types.

                    The default value is `false`, which means the limit applies to all RAT types.

                    '
                period:
                  $ref: '#/components/schemas/ApiV1ServiceProfileProfileIdTrafficLimitPostRequestBodyContentApplicationJsonSchemaPeriod'
                  description: 'Period of the limit.

                    The only supported period is `Monthly`, which uses calendar months and has an ID of `2`.

                    The limit resets at the beginning of each month 00:00 UTC.

                    '
                volume:
                  type: integer
                  format: int64
                  description: 'Limit threshold in the atomic units of the service type (for data, this is bytes).

                    This specifies the amount of data that the service can consume within the period before the limit is reached
                    or exceeded.

                    '
                warning_percent:
                  type: integer
                  description: 'Percentage of the limit volume when the system sends an event.

                    The event is sent when the limit is reached or exceeded.

                    For example, if you set the warning percentage to `80`, the system sends an event when the service consumes
                    80% of the limit volume.

                    '
              required:
              - service
              - volume
