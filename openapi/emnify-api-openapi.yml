  /api/v1/endpoint/{endpoint_id}/quota/data:
    get:
      operationId: endpoint-quota-data-by-endpoint-id-get
      summary: Retrieve data quota details
      description: "Returns details about the assigned Data Quota for an endpoint.\n* `status`: this indicates the current\
        \ status of the quota and may contain the following values:\n    - `ACTIVE`: the endpoint can currently connect and\
        \ has quota left\n    - `EXHAUSTED`: the endpoint has exceeded the quota volume, if it still can use data service\
        \ depends on the action chosen to be performed on exhaustion\n    - `EXPIRED`: the quota has expired; the endpoint\
        \ is denied from using data services (until new quota is added)\n* `volume`: returns the volume left on this quota\
        \ in MB\n* `expiry_date`: timestamp when this quota will expire and the endpoint will definitely be denied from using\
        \ further data services (regardless if the quota volume was used up or not)\n* `peak_throughput`: The maximum bandwidth\
        \ in octets per second after the endpoint has been throttled.\n* `action_on_exhaustion`: returns the behaviour defined\
        \ to be applied when quota volume is used up (exhausted).\n    - `Throttle`: bandwidth will be throttle to the defined\
        \ peak throughput until quota expires\n    - `Block`: data service will be instantly blocked once volume used up,\
        \ regardless if the expiry date is already reached or not\n* `auto_refill`: 0 (false) / 1 (true), refill the quota\
        \ with the last added volume on a daily basis\n"
      tags:
      - subpackage_endpoint
      parameters:
      - name: endpoint_id
        in: path
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        description: 'An `auth_token` should be provided to authenticate a session.


          To obtain an `auth_token`, see the [`/api/v1/authenticate` **POST** request](/developers/api/authentication/authenticate).

          '
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Endpoint_EndpointQuotaDataByEndpointIdGet_Response_200'
    post:
      operationId: endpoint-quota-data-by-endpoint-id-post
      summary: Set data quota
      description: "Set a new data quota.\nYou can set a new data quota for a device at any time.\nAt an initial state, when\
        \ no data quota is set, the device is denied from using data services.\nTo top-up the data volume, you need to retrieve\
        \ the remaining volume, increase it by the top-up volume, and set it as the new quota volume.\n\n<Warning>\n  We have\
        \ deprecated throttling as an action on quota exhaustion and the associated peak throughput parameter.\n  These were\
        \ decommissioned as of December 9, 2024.**\n</Warning>\n\nThe following parameters can be configured:\n* `status`\
        \ (required) - The status of the quota:\n  - 1: `ACTIVE`\n  - 2: `EXHAUSTED`\n  - 3: `EXPIRED`\n* `volume` - Remaining\
        \ quota volume in MB\n* `expiry_date` (required) - Timestamp when the quota expires and the device is denied from\
        \ using further data services\n* `auto_refill` (default: `0`) - Whether the quota should be refilled on a daily basis:\n\
        \  - `0`: Disabled\n  - `1`: Enabled\n* `threshold_percentage` - The remaining quota percentage when the system generates\
        \ a \"Quota threshold reached\" event\n* `action_on_exhaustion`: Action executed after the quota is exhausted:\n \
        \ - `id` (required) - Unique identifer of the action on quota exhaustion\n    - `1`: Block\n    - **DEPRECATED** `2`:\
        \ Throttle\n  - **DEPRECATED** `peak_throughput` - The maximum bandwidth in octets per second after the device has\
        \ been throttled.\n\n<Note>\n  **Events**:\n  The system generates a \"Quota used up\" event if the data quota is\
        \ completely depleted.\n  Then, the device is blocked from further consumption of data.\n  The quota object is included\
        \ in the event details.\n</Note>\n\n<Info>\n  The device can instantly use data services after successfully making\
        \ this API call.\n  You can set any timestamp with a future date.\n  This allows you to create data packages as required\
        \ (for example, 1 hour, 24 hours, 7 days, or any other timeframe).\n</Info>\n"
      tags:
      - subpackage_endpoint
      parameters:
      - name: endpoint_id
        in: path
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        description: 'An `auth_token` should be provided to authenticate a session.


          To obtain an `auth_token`, see the [`/api/v1/authenticate` **POST** request](/developers/api/authentication/authenticate).

          '
        required: true
        schema:
          type: string
      responses:
        '201':
          description: Resource Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Endpoint_EndpointQuotaDataByEndpointIdPost_Response_201'
        '422':
