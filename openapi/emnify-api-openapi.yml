        \ Current month, with statistics calculated up to and including the date requested (for example, May 1-8, 2023, when\
        \ you sent the request on May 8, 2023).\n- `last_hour`: Previous 60 minutes, accumulated per minute and organized\
        \ by data or SMS received by the device (`rx`) and transmitted by the device (`tx`).\n\n<Info>\n  `last_month` and\
        \ `current_month` are only included in the responses if traffic exists.\n</Info>\n"
