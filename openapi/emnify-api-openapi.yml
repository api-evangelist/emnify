  /api/v1/user/mfa:
    post:
      operationId: post-mfa
      summary: Create an MFA key
      description: "Generate and store a MFA key for the requesting user. After this call, the MFA key has the status `activation\
        \ pending` and must be activated through a separate call (`/api/v1/user/mfa/{id}`).\n\nYou must provide following\
        \ fields with this request:\n\n* `type` (Object required)\n  - `id` (Number)\n* `password` (String required) - User\
        \ password\n\nThe **MFA key** object returned by the server contains the following properties:\n\n* `id` (Integer)\
        \ - The unique ID of this MFA key\n* `status` (Object) ID (Integer) - Id of status of this MFA key\n  - `description`\
        \ (String) - description of the status\n* `type` (Object) ID (Integer) - Id of type of this MFA key\n  - `description`\
        \ (String) - description of the type\n* `secret_key` (String) - Secret key (encoded in Base32) for this MFA key, will\
        \ be displayed only on creation\n* `otpauth` (String) - Secret key as a URI encoded for QR codes, will be displayed\
        \ only on creation\n* `creation_date` (Timestamp) - Timestamp when this MFA key was created - type: ISO 8601 timestamp\
        \ format\n* `activation_date` (Timestamp) - Timestamp when this MFA key was activated - type: ISO 8601 timestamp format\n"
      tags:
      - subpackage_authentication
      parameters:
      - name: Authorization
        in: header
        description: 'An `auth_token` should be provided to authenticate a session.


          To obtain an `auth_token`, see the [`/api/v1/authenticate` **POST** request](/developers/api/authentication/authenticate).

          '
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Authentication_postMfa_Response_200'
        '409':
          description: 'Unexpected error in API call.

            See HTTP response body for details.

            '
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostMfaRequestConflictError'
        '422':
          description: 'Unprocessable Entity.

            See HTTP response body for details.

            '
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostMfaRequestUnprocessableEntityError'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  $ref: '#/components/schemas/ApiV1UserMfaPostRequestBodyContentApplicationJsonSchemaType'
                password:
                  type: string
              required:
              - type
              - password
