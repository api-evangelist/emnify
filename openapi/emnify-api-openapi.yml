  /api/v1/endpoint/{endpoint_id}/quota/sms:
    get:
      operationId: endpoint-quota-sms-by-endpoint-id-get
      summary: Show SMS quota details
      description: "Returns details about the assigned SMS Quota for an endpoint.\n\nYou can retrieve the current SMS quota\
        \ status for an endpoint with the following API call. It will return following properties:\n* `status`: this indicates\
        \ the status of the quota and may contain the following values:\n  - `ACTIVE`: the endpoint has quota left and can\
        \ use SMS services\n  - `EXHAUSTED`: the endpoint has exceeded the quota volume; the endpoint is denied from using\
        \ SMS services (until new quota is added)\n  - `EXPIRED`: the quota has expired; the endpoint is denied from using\
        \ SMS services (until new quota is added)\n* `volume`: the amount of SMS left on this quota\n* `expiry_date`: timestamp\
        \ when this quota will expire and the endpoint will definitely be denied from using further SMS services (regardless\
        \ if the quota volume was used up or not)\n* `threshold_percentage`: optional threshold in percentage indicating when\
        \ a \"Threshold Reached\" event shall be sent.\n* `action_on_exhaustion`: returns the behaviour defined to be applied\
        \ when quota volume is used up (exhausted).\n    - `Throttle`: bandwidth will be throttle to the defined peak throughput\
        \ until quota expires\n    - `Block`: data service will be instantly blocked once volume used up, regardless if the\
        \ expiry date is already reached or not\n    - `auto_refill`: 0 (false) / 1 (true), refill the quota with the last\
        \ added volume on a daily basis\n"
      tags:
      - subpackage_endpoint
      parameters:
      - name: endpoint_id
        in: path
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        description: 'An `auth_token` should be provided to authenticate a session.


          To obtain an `auth_token`, see the [`/api/v1/authenticate` **POST** request](/developers/api/authentication/authenticate).

          '
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                description: Any type
    post:
      operationId: endpoint-quota-sms-by-endpoint-id-post
      summary: Set SMS quota
      description: "At any time, a new SMS quota can be set for an endpoint.\nAt an initial state when no SMS quota is set,\
        \ the endpoint will be denied from using SMS services.\nTo top-up the SMS volume one need to retrieve the currently\
        \ left volume, increase it by the top-up volume and set it as the new quota volume.\n\nThe following parameters can\
        \ be configured:\n* `status` - The status of the quota (mandatory):\n  - 1: `ACTIVE`\n  - 2: `EXHAUSTED`\n  - 3: `EXPIRED`\n\
        * `volume`: The volume left on this quota in MB\n* `expiry_date`: Timestamp when this quota will expire and the endpoint\
        \ will definitely be denied from using further data services (mandatory)\n* `auto_refill`: Wether the quota shall\
        \ be refilled on a daily basis (defaults to disabled):\n  - 0: `disabled`\n  - 1: `enabled`\n* `threshold_percentage`:\
        \ The percentage of remaining quota at which the system should generate a `threshold reached` event\n* `action_on_exhaustion`:\
        \ The behaviour of the system after the quota is exhausted:\n  - id: ID of the action on quota exhaustion (mandatory)\n\
        \    - 1: `Block`\n    - 2: `Throttle` (will not take any effect on SMS quota)\n  - `peak_throughput`: The maximum\
        \ bandwidth in octets per second after the endpoint has been throttled.\n  Allowed values are 64000, 128000, 256000,\
        \ 384000. (will not take any effect on SMS quota)\n\n<Note>\n  The endpoint can instantly use the SMS service after\
        \ the API call is successfully made.\n  Any timestamp with a future date can be set, this allows to create SMS packages\
        \ (e.g. for 1 hour, 24 hour, 7 days or any other timeframe) as required.\n</Note>\n"
      tags:
      - subpackage_endpoint
      parameters:
      - name: endpoint_id
        in: path
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        description: 'An `auth_token` should be provided to authenticate a session.


          To obtain an `auth_token`, see the [`/api/v1/authenticate` **POST** request](/developers/api/authentication/authenticate).

          '
        required: true
        schema:
          type: string
      responses:
        '201':
          description: Resource Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Endpoint_EndpointQuotaSmsByEndpointIdPost_Response_201'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                volume:
                  type: number
                  format: double
                expiry_date:
                  type: string
                  format: date-time
                last_volume_added:
                  type: number
                  format: double
                last_status_change_date:
                  type:
                  - string
                  - 'null'
                  format: date-time
                auto_refill:
                  type: boolean
                threshold_percentage:
                  type: number
                  format: double
                threshold_volume:
                  type: number
                  format: double
                status:
                  $ref: '#/components/schemas/ApiV1EndpointEndpointIdQuotaSmsPostRequestBodyContentApplicationJsonSchemaStatus'
                action_on_exhaustion:
                  $ref: '#/components/schemas/ApiV1EndpointEndpointIdQuotaSmsPostRequestBodyContentApplicationJsonSchemaActionOnExhaustion'
              required:
              - volume
              - expiry_date
              - threshold_percentage
              - status
    delete:
      operationId: delete-endpoint-sms-quota-by-id
      summary: Remove SMS quota
      description: "Will delete the SMS quota for the endpoint, if any is set.\n\n<Info>\n  If `apply_sms_quota` is still\
        \ set in the service profile, the endpoint is blocked from sending SMS.\n</Info>\n"
      tags:
