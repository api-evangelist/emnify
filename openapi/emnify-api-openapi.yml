    patch:
      operationId: sim-by-id-patch
      summary: Update a SIM
      description: "Updates a SIM resource.\n\nYou can provide the following fields with this request:\n* `issuer_org` (Object\
        \ optional) - change to a direct child organization of the appropriate type\n* `reseller_org` (Object optional) -\
        \ change to a direct child organization of the appropriate type or empty (`\"reseller_org\": { \"id\": null }` or\
        \ `\"reseller_org\": {}`)\n* `customer_org` (Object optional) - change to own organization or a direct child organization\
        \ of type \"Enterprise\" or empty (`\"customer_org\": { \"id\": null }` or `\"customer_org\": {}`)\n* `status` (Object\
        \ optional) - update the SIM status\n\nThe following restrictions apply when updating SIMs:\n* Users from the issuer\
        \ organization can change any updatable field\n* Users from the reseller organization can update the `reseller_org`\
        \ or `customer_org` fields\n* Users from the customer organization can only update the `status` field\n* `issuer_org`\
        \ can change to a child organization of the type \"Mobile Network Operator\" or \"Service Provider\"\n* `reseller_org`\
        \ can change to child organization of the following types: \"Mobile Network Operator\", \"Service Provider\", or \"\
        Reseller\"\n* `customer_org` can change to a child organization of an \"Enterprise\" type\n* `status` can update from\
        \ \"Issued\" (`\"id\": 0`) to either \"Activated\" (`\"id\": 1`) or \"Factory Test\" (`\"id\": 4`)\n* `status` can\
        \ only update from \"Factory Test\" (`\"id\": 4`) to \"Activated\" (`\"id\": 1`)\n* `status` can switch between \"\
        Activated\" (`\"id\": 1`) and \"Suspended\" (`\"id\": 2`)\n\n<Warning>\n  emnify charges for activated SIMs. To avoid\
        \ accruing unexpected charges, update the SIM `status` to \"Suspended\" (`\"id\": 2`).\n</Warning>\n"
      tags:
      - subpackage_sim
      parameters:
      - name: sim_id
        in: path
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        description: 'An `auth_token` should be provided to authenticate a session.


