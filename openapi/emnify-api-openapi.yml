  /api/v1/sim/migration/workspace:
    post:
      operationId: sim-migration-workspace
      summary: Migrate SIMs between Workspaces
      description: "Migrate SIMs from one Workspace to another.\n\n## Requirements\n\n- The calling user must have **Administrator**\
        \ permissions on both the target and source Workspaces\n- The target Workspace must be an enterprise Workspace\n-\
        \ Only 500 SIMs can be migrated per request\n- You must provide exactly one of: `sims`, `iccids`, or `iccid_range`\n\
        \n<Note>\n  This endpoint requires authentication with [user credentials](/developers/auth/user-credentials), as application\
        \ tokens are scoped to a single Workspace.\n</Note>\n\n## Behavior\n\n- **Dry run mode**: The `dry_run` parameter\
        \ defaults to `true`.\n  Set it to `false` to execute the migration.\n- **Activated SIMs**: SIMs in status `ACTIVATED`\
        \ are automatically suspended during migration.\n- **Attached devices**: If SIMs are attached to devices, set `auto_detach_devices:\
        \ true` or the request fails.\n\n<Warning>\n  The request fails if one or more SIMs don't meet the requirements for\
        \ migration.\n  Check the `errors` array in the response for details.\n</Warning>\n"
      tags:
      - subpackage_sim
      parameters:
      - name: Authorization
        in: header
        description: 'An `auth_token` should be provided to authenticate a session.


          To obtain an `auth_token`, see the [`/api/v1/authenticate` **POST** request](/developers/api/authentication/authenticate).

          '
        required: true
        schema:
          type: string
      responses:
        '200':
          description: 'Successful migration request.

            If `dry_run` was set to `false`, the migration is processed.

            If `dry_run` was set to `true`, the response contains a summary of the changes that would be executed.

            '
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SIM_SimMigrationWorkspace_Response_200'
        '400':
          description: 'The request is malformed.


            Common causes:


            - Exceeds the maximum count of 500 SIMs

            - Multiple SIM identifiers provided (only one of `sims`, `iccids`, or `iccid_range` is allowed)

            - Invalid ICCID format (must be exactly 19 digits)

            - ICCID range `end` value is less than `start`

            '
          content:
            application/json:
              schema:
                description: Any type
        '404':
          description: 'One or more SIMs or the target Workspace couldn''t be found or are inaccessible.

            '
          content:
            application/json:
              schema:
                description: Any type
        '409':
          description: 'One or more SIMs don''t meet the requirements for migration.


            The response includes an `errors` array with details about which SIMs failed and why.


            | Error Code | Message | Resolution |

            |------------|---------|------------|

            | 1502 | SIM(s) attached to devices | Set `auto_detach_devices: true` to automatically detach SIMs before migration
            |

            | 1503 | SIM(s) in disallowed status | Adjust the `allowed_sim_statuses` filter or change the SIM status before
            migrating |

            | 1504 | No admin access on source workspace | Request **Administrator** permissions on the source Workspace |

            | 1505 | Migration between Brazilian and non-Brazilian workspaces is not allowed | This is a regulatory restriction
            and cannot be bypassed |

            '
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimMigrationWorkspaceRequestConflictError'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                sims:
                  type: array
                  items:
                    $ref: '#/components/schemas/ApiV1SimMigrationWorkspacePostRequestBodyContentApplicationJsonSchemaSimsItems'
                  description: "List of SIMs to migrate.\nThe list may include up to 500 SIMs.\n\n<Info>\n  Cannot be used\
                    \ in combination with the `iccids` or the `iccid_range` field.\n</Info>\n"
                iccids:
                  type: array
                  items:
                    type: string
                  description: "List of ICCIDs to migrate.\nAll SIMs must belong to the source Workspace.\nThe list may include\
                    \ up to 500 ICCIDs.\n\n<Info>\n  Cannot be used in combination with the `sims` or the `iccid_range` field.\n\
                    </Info>\n"
                iccid_range:
                  $ref: '#/components/schemas/ApiV1SimMigrationWorkspacePostRequestBodyContentApplicationJsonSchemaIccidRange'
                  description: "ICCID range to migrate.\nAll SIMs within the range must belong to the source Workspace.\n\
                    The range may include up to 500 ICCIDs.\nThe `end` value must be greater than or equal to the `start`\
                    \ value.\n\n<Info>\n  Cannot be used in combination with the `iccids` or the `sims` field.\n</Info>\n"
                allowed_sim_statuses:
                  type: array
                  items:
                    $ref: '#/components/schemas/ApiV1SimMigrationWorkspacePostRequestBodyContentApplicationJsonSchemaAllowedSimStatusesItems'
                  description: 'List of SIM statuses that are allowed to be migrated.

                    The request is rejected if a SIM has a status that isn''t in this list.

                    If not provided, all SIM statuses are allowed.

                    '
                dry_run:
                  type: boolean
                  default: true
                  description: "Controls whether the migration is executed or simulated.\n\n- `true` (default): Returns a\
                    \ preview of SIMs that would be migrated without making changes\n- `false`: Executes the migration\n\n\
                    <Tip>\n  Always test with a dry run first to verify the SIMs match your expectations.\n</Tip>\n"
                target_workspace:
                  $ref: '#/components/schemas/ApiV1SimMigrationWorkspacePostRequestBodyContentApplicationJsonSchemaTargetWorkspace'
                  description: 'Target Workspace to migrate SIMs to.

                    Must be an enterprise Workspace.

                    The calling user must have **Administrator** permissions on the target Workspace.

                    '
                auto_detach_devices:
                  type: boolean
                  description: 'If set to `true`, the SIMs automatically detach from the devices before being migrated.

                    Otherwise, the request is rejected if one or more SIMs are attached to devices.

                    '
              required:
              - target_workspace
