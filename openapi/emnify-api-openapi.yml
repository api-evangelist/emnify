      description: "Re-sends activation mail to the user.\n\nAs this endpoint is open to the public (no authentication token\
        \ necessary), it requires instead the google reCAPTCHA token to ensure that no robot is performing the request.\n\
        Moreover, there's a time limit on how often a given user may be issued with a new activation mail.\n\n<Info>\n  According\
        \ to the [reCAPTCHA documentation](https://developers.google.com/recaptcha/docs/display) a \"Site Key\" is necessary.\n\
        \  If you want to implement this feature in your client, please contact emnify support to obtain this \"Site Key\"\
        \ for your domain.\n</Info>\n"
